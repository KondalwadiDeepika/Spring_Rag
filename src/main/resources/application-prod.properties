# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# NVIDIA - Embedding
spring.ai.openai.base-url=https://integrate.api.nvidia.com
spring.ai.openai.api-key=${NVIDIA_API_KEY}
spring.ai.openai.embedding.options.model=nvidia/nv-embed-v1
spring.ai.openai.embedding.options.dimensions=4096

# Groq - Chat
spring.ai.openai.chat.base-url=https://api.groq.com/openai
spring.ai.openai.chat.api-key=${GROQ_API_KEY}
spring.ai.openai.chat.options.model=llama-3.1-8b-instant
spring.ai.openai.chat.options.temperature=0
spring.ai.openai.chat.options.max-tokens=80

# PgVector - IVFFlat supports >2000 dimensions
spring.ai.vectorstore.pgvector.index-type=IVFFlat
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=4096
spring.ai.vectorstore.pgvector.schema-validation=false
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.table-name=vector_store

# Server
server.port=${PORT:8080}